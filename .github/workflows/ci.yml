name: CI

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show compiler
        run: ${{ matrix.cc }} --version

      - name: Build tests
        shell: bash
        run: |
          if [ "${{ matrix.cc }}" = "clang" ]; then
            EXTRA_FLAGS="-Wno-gnu-zero-variadic-macro-arguments"
          else
            EXTRA_FLAGS=""
          fi
          ${{ matrix.cc }} -std=c99 -Wall -Wextra -Wpedantic -Werror $EXTRA_FLAGS -Iinclude src/massert.c tests/test_all.c -o tests/test_all

      - name: Run tests
        run: ./tests/test_all
